---
- name: Bootstrap WinRM for Ansible management (optional)
  hosts: windows_ad
  gather_facts: false
  tasks:
    - name: Enable PSRemoting and open firewall
      ansible.windows.win_powershell:
        script: |
          Enable-PSRemoting -Force
          winrm quickconfig -q
          Set-Item -Path WSMan:\localhost\Service\AllowUnencrypted -Value $false
          Set-Item -Path WSMan:\localhost\Service\Auth\Basic -Value $false
          Set-Item -Path WSMan:\localhost\Service\Auth\NTLM -Value $true
          if (-not (Get-ChildItem -Path WSMan:\localhost\Listener | Where-Object { $_.Keys -match 'Transport=HTTPS' })) {
            $cert = New-SelfSignedCertificate -DnsName $env:COMPUTERNAME -CertStoreLocation Cert:\LocalMachine\My
            New-Item -Path WSMan:\localhost\Listener -Transport HTTPS -Address * -CertificateThumbPrint $cert.Thumbprint -Force
          }

    - name: Ensure WinRM service is started
      ansible.windows.win_service:
        name: WinRM
        state: started
        start_mode: auto
