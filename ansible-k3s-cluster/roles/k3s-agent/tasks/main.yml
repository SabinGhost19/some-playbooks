---
# Role: k3s-agent - Instalare K3s pe nodurile worker

- name: Check if K3s is already installed
  stat:
    path: /usr/local/bin/k3s
  register: k3s_binary

- name: Download K3s install script
  get_url:
    url: https://get.k3s.io
    dest: /tmp/k3s-install.sh
    mode: '0755'
  when: not k3s_binary.stat.exists

- name: Get master node IP
  set_fact:
    k3s_master_ip: "{{ hostvars[groups['k3s_masters'][0]]['ansible_host'] }}"

- name: Get K3s token from master
  set_fact:
    k3s_token: "{{ hostvars[groups['k3s_masters'][0]]['k3s_node_token'] }}"

- name: Install K3s agent (worker)
  shell: |
    INSTALL_K3S_VERSION="{{ k3s_version }}" \
    K3S_URL="https://{{ k3s_master_ip }}:6443" \
    K3S_TOKEN="{{ k3s_token }}" \
    INSTALL_K3S_EXEC="agent {{ k3s_agent_args }}" \
    /tmp/k3s-install.sh
  args:
    creates: /usr/local/bin/k3s
  register: k3s_agent_install

- name: Wait for K3s agent service to start
  systemd:
    name: k3s-agent
    state: started
    enabled: yes
  retries: 5
  delay: 10

- name: Create .kube directory for user
  file:
    path: "/home/{{ ansible_user }}/.kube"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0755'

- name: Create kubectl alias
  lineinfile:
    path: "/home/{{ ansible_user }}/.bashrc"
    line: "alias kubectl='k3s kubectl'"
    state: present
  when: install_kubectl_alias | default(true)
