---
# Playbook: Adăugare nod nou în cluster

- name: Pregătire nod nou
  hosts: new_node
  become: yes
  gather_facts: yes
  roles:
    - common
    - microk8s

- name: Adăugare nod în cluster
  hosts: new_node
  become: yes
  gather_facts: yes
  tasks:
    - name: Obținere token de join de la master
      command: microk8s add-node --token-ttl 3600
      register: join_command
      delegate_to: "{{ groups['microk8s_masters'][0] }}"
      changed_when: false

    - name: Extragere URL join
      set_fact:
        join_url: "{{ join_command.stdout_lines | select('match', '^microk8s join') | first | regex_replace('microk8s join ', '') }}"

    - name: Join nod la cluster
      command: "microk8s join {{ join_url }}"
      register: join_result
      failed_when: join_result.rc != 0 and 'already known to dqlite' not in join_result.stderr
      changed_when: "'already known to dqlite' not in join_result.stderr"

- name: Verificare adăugare nod
  hosts: microk8s_masters
  become: yes
  tasks:
    - name: Așteptare pentru nod să fie Ready
      command: microk8s kubectl get nodes
      register: nodes_status
      until: "'NotReady' not in nodes_status.stdout"
      retries: 20
      delay: 15
      changed_when: false

    - name: Afișare noduri
      debug:
        var: nodes_status.stdout_lines
