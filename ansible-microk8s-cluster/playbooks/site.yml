---
# Playbook principal: Instalare completă MicroK8s Cluster
# Rulare: ansible-playbook -i inventory/hosts.ini playbooks/site.yml

- name: Pregătire toate nodurile
  hosts: microk8s_cluster
  become: yes
  gather_facts: yes
  roles:
    - common

- name: Instalare MicroK8s pe toate nodurile
  hosts: microk8s_cluster
  become: yes
  gather_facts: yes
  serial: 1  # Instalare secvențială pentru a evita probleme
  roles:
    - microk8s

- name: Formare cluster MicroK8s
  hosts: microk8s_cluster
  become: yes
  gather_facts: yes
  roles:
    - cluster

- name: Instalare tool-uri adiționale
  hosts: microk8s_cluster
  become: yes
  gather_facts: yes
  roles:
    - extras

- name: Verificare finală cluster
  hosts: microk8s_masters
  become: yes
  tasks:
    - name: Afișare informații cluster
      command: microk8s kubectl cluster-info
      register: cluster_info
      changed_when: false

    - name: Status cluster
      debug:
        msg: "{{ cluster_info.stdout_lines }}"

    - name: Afișare noduri
      command: microk8s kubectl get nodes -o wide
      register: nodes_info
      changed_when: false

    - name: Lista noduri
      debug:
        msg: "{{ nodes_info.stdout_lines }}"

    - name: Afișare poduri sistem
      command: microk8s kubectl get pods -A
      register: pods_info
      changed_when: false

    - name: Lista poduri
      debug:
        msg: "{{ pods_info.stdout_lines }}"
