---
# Role: cluster - Formarea cluster-ului MicroK8s

- name: Obținere token de join de la master
  command: microk8s add-node --token-ttl 3600
  register: join_command
  changed_when: false
  when: inventory_hostname in groups['microk8s_masters']

- name: Extragere URL join
  set_fact:
    join_url: "{{ join_command.stdout_lines | select('match', '^microk8s join') | first | regex_replace('microk8s join ', '') }}"
  when: inventory_hostname in groups['microk8s_masters']

- name: Distribuire token către workers
  set_fact:
    master_join_url: "{{ hostvars[groups['microk8s_masters'][0]]['join_url'] }}"
  when: inventory_hostname in groups['microk8s_workers']

- name: Verificare dacă nodul este deja în cluster
  command: microk8s kubectl get nodes -o name
  register: cluster_nodes
  changed_when: false
  ignore_errors: yes
  when: inventory_hostname in groups['microk8s_masters']

- name: Join workers la cluster
  block:
    - name: Generare token nou pentru fiecare worker
      command: microk8s add-node --token-ttl 3600
      register: worker_join_token
      delegate_to: "{{ groups['microk8s_masters'][0] }}"
      changed_when: false

    - name: Extragere URL join pentru worker
      set_fact:
        worker_join_url: "{{ worker_join_token.stdout_lines | select('match', '^microk8s join') | first | regex_replace('microk8s join ', '') }}"

    - name: Executare join pe worker
      command: "microk8s join {{ worker_join_url }}"
      register: join_result
      failed_when: join_result.rc != 0 and 'already known to dqlite' not in join_result.stderr
      changed_when: "'already known to dqlite' not in join_result.stderr"
  when: inventory_hostname in groups['microk8s_workers']

- name: Așteptare pentru noduri să fie Ready
  command: microk8s kubectl get nodes
  register: nodes_status
  until: "'NotReady' not in nodes_status.stdout"
  retries: 20
  delay: 15
  changed_when: false
  when: inventory_hostname in groups['microk8s_masters']

- name: Afișare status noduri
  command: microk8s kubectl get nodes -o wide
  register: nodes_wide
  changed_when: false
  when: inventory_hostname in groups['microk8s_masters']

- name: Status final cluster
  debug:
    var: nodes_wide.stdout_lines
  when: inventory_hostname in groups['microk8s_masters']
